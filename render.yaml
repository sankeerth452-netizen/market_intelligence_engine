# Render Blueprint — provisions the web service AND a managed Postgres, wired
# together automatically. To deploy: push this repo to GitHub, then in Render
# choose  New +  ->  Blueprint  ->  pick this repo. Render reads this file and
# creates both resources; DATABASE_URL is injected into the web service for you.
services:
  - type: web
    name: market-intelligence-engine
    runtime: docker            # builds the Dockerfile in this repo
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true           # redeploy on every push to the default branch
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mie-db
          property: connectionString
      # ---- Live demo: JB Hi-Fi, all real (no synthetic in the product) ----
      - key: DATA_MODE
        value: real             # live Google News + demand-trend + sitemap content-gap
      - key: CLIENT_NAME
        value: JB Hi-Fi
      - key: CLIENT_INDUSTRY
        value: electronics retail
      - key: CLIENT_CATEGORIES
        value: TVs,Laptops,Headphones,Phones,Cameras,Speakers,Tablets,Smartwatches,Gaming,Soundbars
      - key: SITE_URL
        value: https://www.jbhifi.com.au
      - key: ANTHROPIC_API_KEY
        sync: false             # optional: set to enable the free-form assistant

databases:
  - name: mie-db
    plan: free                 # NOTE: Render's free Postgres expires after 90 days
    databaseName: mie
    user: mie
