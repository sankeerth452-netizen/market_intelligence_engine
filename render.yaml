# Render Blueprint — provisions the web service AND a managed Postgres, wired
# together automatically. To deploy: push this repo to GitHub, then in Render
# choose  New +  ->  Blueprint  ->  pick this repo. Render reads this file and
# creates both resources; DATABASE_URL is injected into the web service for you.
services:
  - type: web
    name: market-intelligence-engine
    runtime: docker            # builds the Dockerfile in this repo
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true           # redeploy on every push to the default branch
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mie-db
          property: connectionString
      # ---- Live demo: JB Hi-Fi, all real (no synthetic in the product) ----
      - key: DATA_MODE
        value: real             # live Google News + demand-trend + sitemap content-gap
      - key: CLIENT_NAME
        value: JB Hi-Fi
      - key: CLIENT_INDUSTRY
        value: electronics retail
      - key: CLIENT_CATEGORIES
        value: TVs,Laptops,Headphones,Phones,Cameras,Speakers,Tablets,Smartwatches,Gaming,Soundbars
      - key: SITE_URL
        value: https://www.jbhifi.com.au
      - key: ANTHROPIC_API_KEY
        sync: false             # optional: enables the AI assistant + AI Strategist
      - key: APIFY_API_KEY
        sync: false             # optional: enables real TikTok velocity (Apify)
      # ---- Competitor monitoring (weekly crawl below keeps this fresh) ----
      - key: COMPETITOR_URLS
        value: https://www.thegoodguys.com.au,https://www.officeworks.com.au,https://www.harveynorman.com.au
      - key: COMPETITOR_CRAWL_ON_BOOT
        value: "1"              # seed a baseline on first boot

  # Weekly competitor crawl — updates the shared DB the web service reads.
  # NOTE: Render Cron Jobs require a paid instance; until then the web app's
  # "Refresh" button (POST /api/competitors/refresh) triggers the same crawl.
  - type: cron
    name: mie-competitor-crawl
    runtime: docker
    schedule: "0 3 * * 1"       # Mondays 03:00 UTC
    dockerCommand: python crawl_job.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mie-db
          property: connectionString
      - key: COMPETITOR_URLS
        value: https://www.thegoodguys.com.au,https://www.officeworks.com.au,https://www.harveynorman.com.au

databases:
  - name: mie-db
    plan: free                 # NOTE: Render's free Postgres expires after 90 days
    databaseName: mie
    user: mie
